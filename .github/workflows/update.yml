name: Update App Markdown Files

### This code was generated by Google Gemini, if you have any questions or suggestions, please let me know!

on:
  push:
    paths:
      - 'apps/**.appdata.xml'
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run update script
        run: python update_apps.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-update MD files from AppData"
          file_pattern: 'apps/*.md'
