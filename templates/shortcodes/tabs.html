html
<div class="tabs-container" id="tabs-{{ nth }}">
    <div class="tabs-header flex border-b">
        {% for name in names %}
        <button 
            class="tab-link px-4 py-2 {% if loop.first %}active-tab{% endif %}" 
            onclick="openTab(event, 'tab-{{ nth }}-{{ loop.index0 }}')">
            {{ name }}
        </button>
        {% endfor %}
    </div>
    <div class="tabs-content">
        {{ body | markdown | safe }}
    </div>
</div>

<script>
function openTab(evt, tabId) {
    let container = evt.currentTarget.closest('.tabs-container');
    container.querySelectorAll('.tab-pane').forEach(tab => tab.style.display = 'none');
    document.getElementById(tabId).style.display = 'block';
}
</script>
